<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reachy Co-Host</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      flex-shrink: 0;
      padding: 0.7rem 1.2rem;
      border-bottom: 1px solid #1e1e1e;
      display: flex;
      align-items: center;
      gap: 0.7rem;
    }
    header h1 { font-size: 1rem; font-weight: 600; margin-right: auto; }
    #status-dot { width: 9px; height: 9px; border-radius: 50%; background: #555; flex-shrink: 0; }
    #status-dot.waiting   { background: #4ade80; }
    #status-dot.listening { background: #60a5fa; animation: pulse 1.2s infinite; }
    #status-dot.playing   { background: #facc15; animation: pulse 1s infinite; }
    #status-dot.thinking  { background: #f97316; animation: pulse 0.6s infinite; }
    #status-dot.done      { background: #555; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    #status-text { font-size: 0.8rem; color: #555; }
    .tab-btn {
      padding: 0.32rem 0.85rem; border-radius: 5px; border: 1px solid #2a2a2a;
      background: transparent; color: #666; font-size: 0.82rem; cursor: pointer; transition: all 0.15s;
    }
    .tab-btn.active { background: #1e1e1e; color: #e8e8e8; border-color: #444; }
    .tab-btn:hover:not(.active) { border-color: #333; color: #999; }

    /* ── Layout ── */
    .body { flex: 1; display: flex; min-height: 0; }

    /* ── Sidebar ── */
    #sidebar {
      width: 210px; flex-shrink: 0; border-right: 1px solid #1a1a1a;
      display: flex; flex-direction: column;
    }
    .sidebar-header {
      padding: 0.55rem 0.9rem; border-bottom: 1px solid #1a1a1a;
      font-size: 0.7rem; color: #444; letter-spacing: 0.09em; text-transform: uppercase;
    }
    #script-list { flex: 1; overflow-y: auto; padding: 0.4rem 0; }
    .script-item {
      padding: 0.5rem 0.9rem; font-size: 0.84rem; color: #777; cursor: pointer;
      display: flex; align-items: center; justify-content: space-between;
      margin: 0 0.35rem; border-radius: 4px; transition: background 0.1s;
    }
    .script-item:hover { background: #181818; color: #bbb; }
    .script-item.active { background: #1a1428; color: #a78bfa; }
    .script-item-btns { display: flex; gap: 2px; }
    .script-item .load-btn, .script-item .edit-btn {
      font-size: 0.7rem; color: #444; background: none; border: none;
      cursor: pointer; padding: 2px 6px; border-radius: 3px; white-space: nowrap; transition: color 0.1s;
    }
    .script-item:hover .load-btn,
    .script-item:hover .edit-btn { color: #777; }
    .script-item.active .load-btn,
    .script-item.active .edit-btn { color: #7c3aed; }
    #btn-new {
      margin: 0.5rem 0.6rem; padding: 0.4rem; border-radius: 5px;
      border: 1px dashed #2a2a2a; background: transparent; color: #444;
      font-size: 0.8rem; cursor: pointer; transition: all 0.15s; width: calc(100% - 1.2rem);
    }
    #btn-new:hover { border-color: #444; color: #777; }

    /* ── Main ── */
    #main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

    /* ── Perform view ── */
    #view-perform { flex: 1; display: flex; flex-direction: column; min-height: 0; }
    #script-view {
      flex: 1; overflow-y: auto; padding: 1.1rem 1.4rem;
      display: flex; flex-direction: column; gap: 0.8rem;
    }
    .turn {
      padding: 0.7rem 0.9rem; border-radius: 7px; max-width: 660px;
      opacity: 0.2; transition: opacity 0.2s; border-left: 3px solid transparent;
    }
    .turn.past   { opacity: 0.38; }
    .turn.active { opacity: 1; border-left-color: #facc15; background: #181818; }
    .turn.future { opacity: 0.12; }
    .turn .spk {
      font-size: 0.67rem; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; margin-bottom: 0.28rem; display: flex; align-items: center; gap: 0.4rem;
    }
    .turn.human  .spk { color: #60a5fa; }
    .turn.reachy .spk { color: #a78bfa; }
    .badge {
      font-size: 0.62rem; background: #222; color: #777;
      border-radius: 3px; padding: 1px 5px;
    }
    .turn .txt { font-size: 0.93rem; line-height: 1.55; }

    /* ── Edit view ── */
    #view-edit { flex: 1; display: none; flex-direction: column; min-height: 0; }
    .edit-toolbar {
      padding: 0.55rem 1rem; border-bottom: 1px solid #1a1a1a;
      display: flex; align-items: center; gap: 0.6rem; flex-shrink: 0;
    }
    #ed-filename {
      font-size: 0.83rem; background: #181818; border: 1px solid #2a2a2a;
      border-radius: 5px; color: #ccc; padding: 0.28rem 0.55rem; width: 170px;
    }
    #ed-filename:focus { outline: none; border-color: #444; }
    .btn-save {
      padding: 0.28rem 0.85rem; border-radius: 5px; border: 1px solid #333;
      background: #1a1a1a; color: #aaa; font-size: 0.82rem; cursor: pointer; transition: all 0.15s;
    }
    .btn-save:hover { border-color: #555; color: #e8e8e8; }
    .saved-flash { font-size: 0.75rem; color: #4ade80; opacity: 0; transition: opacity 0.3s; }
    .saved-flash.show { opacity: 1; }

    /* Context block */
    .context-block {
      flex-shrink: 0; padding: 0.7rem 1rem; border-bottom: 1px solid #1a1a1a;
      display: flex; gap: 0.8rem;
    }
    .context-field { flex: 1; display: flex; flex-direction: column; gap: 0.35rem; }
    .context-field label {
      font-size: 0.7rem; color: #444;
      letter-spacing: 0.09em; text-transform: uppercase;
    }
    .context-field textarea {
      width: 100%; background: #0d0d0d; border: 1px solid #1e1e1e; border-radius: 5px;
      color: #888; font-size: 0.82rem; font-family: inherit; line-height: 1.5;
      padding: 0.45rem 0.65rem; resize: vertical; min-height: 60px;
    }
    .context-field textarea:focus { outline: none; border-color: #333; color: #bbb; }
    .context-field textarea::placeholder { color: #2a2a2a; }

    /* Turn cards */
    #turn-list { flex: 1; overflow-y: auto; padding: 0.8rem 1rem; display: flex; flex-direction: column; gap: 0.6rem; }
    .turn-card {
      background: #141414; border: 1px solid #242424; border-radius: 8px;
      padding: 0.7rem 0.9rem; display: flex; flex-direction: column; gap: 0.55rem;
    }
    .turn-card-header { display: flex; align-items: center; gap: 0.55rem; }
    .spk-select {
      padding: 0.28rem 0.55rem; border-radius: 5px; border: 1px solid #2a2a2a;
      background: #1a1a1a; color: #ccc; font-size: 0.82rem; cursor: pointer;
    }
    .spk-select.human  { border-color: #1e3a5f; color: #60a5fa; }
    .spk-select.reachy { border-color: #2d1a5e; color: #a78bfa; }
    .spk-select:focus { outline: none; }

    .turn-text {
      background: #0d0d0d; border: 1px solid #1e1e1e; border-radius: 5px;
      color: #d4d4d4; font-size: 0.87rem; font-family: inherit;
      line-height: 1.5; padding: 0.45rem 0.65rem; resize: vertical; min-height: 52px;
      transition: border-color 0.15s;
    }
    .turn-text:focus { outline: none; border-color: #333; }
    .turn-text::placeholder { color: #333; }

    .reachy-opts { display: flex; align-items: center; gap: 0.9rem; flex-wrap: wrap; }
    .reachy-opts label { font-size: 0.75rem; color: #555; display: flex; align-items: center; gap: 0.35rem; }
    .gesture-select {
      padding: 0.22rem 0.5rem; border-radius: 4px; border: 1px solid #2a2a2a;
      background: #1a1a1a; color: #999; font-size: 0.78rem; cursor: pointer;
    }
    .gesture-select:focus { outline: none; border-color: #444; }
    .improv-check { accent-color: #7c3aed; cursor: pointer; }
    .improv-hint-input {
      flex: 1; min-width: 120px; background: #0d0d0d; border: 1px solid #1e1e1e;
      border-radius: 4px; color: #888; font-size: 0.78rem; padding: 0.22rem 0.5rem;
    }
    .improv-hint-input:focus { outline: none; border-color: #333; }
    .improv-hint-input::placeholder { color: #2e2e2e; }

    .card-actions { margin-left: auto; display: flex; gap: 0.3rem; }
    .icon-btn {
      background: none; border: none; color: #333; cursor: pointer;
      font-size: 0.85rem; padding: 2px 5px; border-radius: 3px; transition: color 0.1s;
    }
    .icon-btn:hover { color: #888; }
    .icon-btn.del:hover { color: #f87171; }

    #btn-add-turn {
      margin: 0.4rem 0; padding: 0.45rem; border-radius: 6px;
      border: 1px dashed #222; background: transparent; color: #333;
      font-size: 0.82rem; cursor: pointer; transition: all 0.15s;
    }
    #btn-add-turn:hover { border-color: #444; color: #666; }

    /* ── Teleprompter overlay ── */
    #teleprompter {
      display: none; position: absolute; inset: 0; z-index: 10;
      background: #080808; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 3rem 4rem; text-align: center;
    }
    #teleprompter.active { display: flex; }
    #tp-speaker {
      font-size: 0.75rem; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: #60a5fa; margin-bottom: 1.2rem;
    }
    #tp-text {
      font-size: 2.6rem; line-height: 1.4; color: #f0f0f0; font-weight: 500;
      max-width: 900px;
    }
    #tp-next {
      margin-top: 2.5rem; font-size: 0.9rem; color: #2a2a2a; max-width: 700px; line-height: 1.5;
    }
    #tp-next span { color: #a78bfa; font-size: 0.75rem; text-transform: uppercase;
      letter-spacing: 0.1em; display: block; margin-bottom: 0.4rem; }

    /* ── Footer ── */
    footer {
      flex-shrink: 0; padding: 0.65rem 1.2rem; border-top: 1px solid #1a1a1a;
      display: flex; align-items: center; gap: 0.7rem;
    }
    .btn-primary {
      padding: 0.45rem 1.4rem; border-radius: 6px; border: none;
      background: #6d28d9; color: #fff; font-size: 0.88rem; font-weight: 600;
      cursor: pointer; transition: background 0.15s, opacity 0.15s;
    }
    .btn-primary:hover:not(:disabled) { background: #7c3aed; }
    .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; }
    #footer-status { font-size: 0.78rem; color: #444; }
  </style>
</head>
<body>

<header>
  <div id="status-dot"></div>
  <h1>Reachy Co-Host</h1>
  <span id="status-text"></span>
</header>

<div class="body">
  <!-- Sidebar -->
  <div id="sidebar">
    <div class="sidebar-header">Scripts</div>
    <div id="script-list"></div>
    <button id="btn-new" onclick="newScript()">+ New script</button>
  </div>

  <!-- Main -->
  <div id="main">

    <!-- Perform -->
    <div id="view-perform" style="position:relative;">
      <div id="teleprompter">
        <div id="tp-speaker">You</div>
        <div id="tp-text"></div>
        <div id="tp-next"><span>Reachy next</span><span id="tp-next-text"></span></div>
      </div>
      <div id="script-view"></div>
    </div>

    <!-- Edit -->
    <div id="view-edit">
      <div class="edit-toolbar">
        <input id="ed-filename" type="text" placeholder="script-name.txt" />
        <button class="btn-save" onclick="saveScript()">Save</button>
        <span class="saved-flash" id="saved-flash">Saved ✓</span>
      </div>
      <div class="context-block">
        <div class="context-field">
          <label>Personality</label>
          <textarea id="ed-personality" rows="3" placeholder="How Reachy should act this episode — quirks, opinions, tone. e.g. 'Obsessed with Helvetica. Gets defensive about Comic Sans. Finds the human's enthusiasm a little exhausting.'"></textarea>
        </div>
        <div class="context-field">
          <label>Topic & Background</label>
          <textarea id="ed-topic" rows="3" placeholder="Facts and context Reachy can draw on. e.g. 'This episode covers typography history from Gutenberg to CSS web fonts. Key figures: Garamond, Bodoni, Adrian Frutiger.'"></textarea>
        </div>
      </div>
      <div id="turn-list"></div>
      <button id="btn-add-turn" onclick="addTurn()">+ Add turn</button>
    </div>

  </div>
</div>

<footer>
  <button class="btn-primary" id="btn-next" onclick="nextTurn()">Start →</button>
  <span id="footer-status"></span>
  <button class="tab-btn" id="btn-tp" onclick="toggleTeleprompter()" style="margin-left:auto;">⬛ Teleprompter</button>
</footer>

<script>
const GESTURES = [
  "idle","nod","double_nod","shake",
  "tilt_right","tilt_left","look_up","think",
  "surprised","excited","bow"
];

// ── App state ──
let appState = { turns:[], index:-1, status:"idle", total:0 };
let teleprompterOn = false;
let scripts = [];
let activeScript = null;
let editorTurns = [];       // structured turns in the editor
let editorSourceName = null; // filename the editor was opened from (null = new script)

// ── SSE ──
const es = new EventSource("/api/events");
es.addEventListener("state", e => {
  appState = JSON.parse(e.data);
  renderPerform();
  renderFooter();
  renderTeleprompter();
});

// ── Tabs ──
function setTab(tab) {
  document.getElementById("view-perform").style.display = tab==="perform" ? "flex" : "none";
  document.getElementById("view-edit").style.display    = tab==="edit"    ? "flex" : "none";
}

// ── Script list ──
async function loadScriptList() {
  const res = await fetch("/api/scripts");
  scripts = await res.json();
  renderScriptList();
}

function renderScriptList() {
  const el = document.getElementById("script-list");
  el.innerHTML = "";
  scripts.forEach(name => {
    const div = document.createElement("div");
    div.className = "script-item" + (name===activeScript ? " active" : "");
    const label = document.createElement("span");
    label.textContent = name.replace(/\.txt$/,"");
    label.style.flex = "1";
    const btns = document.createElement("div");
    btns.className = "script-item-btns";
    const editBtn = document.createElement("button");
    editBtn.className = "edit-btn";
    editBtn.textContent = "Edit";
    editBtn.onclick = (e) => { e.stopPropagation(); openInEditor(name); };
    const loadBtn = document.createElement("button");
    loadBtn.className = "load-btn";
    loadBtn.textContent = "Load →";
    loadBtn.onclick = (e) => { e.stopPropagation(); loadScript(name); };
    btns.append(editBtn, loadBtn);
    div.append(label, btns);
    el.appendChild(div);
  });
}

async function loadScript(name) {
  const res = await fetch("/api/load", {
    method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({name})
  });
  if (res.ok) {
    activeScript = name;
    renderScriptList();
    setTab("perform");
  }
}

// ── Editor: open ──
async function openInEditor(name) {
  const res = await fetch(`/api/scripts/${encodeURIComponent(name)}`);
  if (!res.ok) {
    alert(`Could not open "${name}" — try restarting the server.`);
    return;
  }
  const data = await res.json();
  editorSourceName = name;
  document.getElementById("ed-filename").value = name;
  const { personality, topic, turns } = parseScriptText(data.content);
  document.getElementById("ed-personality").value = personality;
  document.getElementById("ed-topic").value = topic;
  editorTurns = turns;
  renderEditor();
  setTab("edit");
}

function newScript() {
  editorSourceName = null;
  document.getElementById("ed-filename").value = "new-script.txt";
  document.getElementById("ed-personality").value = "";
  document.getElementById("ed-topic").value = "";
  editorTurns = [
    { speaker:"HUMAN",  text:"", gesture:"idle", improv:false, hint:"" },
    { speaker:"REACHY", text:"", gesture:"nod",  improv:false, hint:"" },
  ];
  renderEditor();
  setTab("edit");
}

// ── Script text ↔ structured turns ──
function parseScriptText(raw) {
  const turns = [];
  let current = null;
  let inContext = false;
  const contextLines = [];
  const topicLines = [];
  const lines = raw.split("\n");
  const headerRe = /^\[(HUMAN|REACHY)([^\]]*)\]$/;
  for (const line of lines) {
    const trimmed = line.trim();
    if (trimmed === "[PERSONALITY]" || trimmed === "[CONTEXT]") { inContext = "personality"; continue; }
    if (trimmed === "[TOPIC]") { inContext = "topic"; continue; }
    const m = headerRe.exec(trimmed);
    if (m) {
      inContext = false;
      if (current) turns.push(current);
      const attrs = {};
      const attrRe = /(\w+)=(\S+)/g;
      let a;
      while ((a = attrRe.exec(m[2])) !== null) attrs[a[1]] = a[2];
      current = {
        speaker: m[1], text: "", gesture: attrs.gesture || "idle",
        improv: attrs.improv === "true", hint: "",
      };
    } else if (inContext === "personality") {
      contextLines.push(line);
    } else if (inContext === "topic") {
      topicLines.push(line);
    } else if (current && trimmed) {
      if (current.improv) current.hint = (current.hint ? current.hint + " " : "") + trimmed;
      else current.text = (current.text ? current.text + " " : "") + trimmed;
    }
  }
  if (current) turns.push(current);
  return { personality: contextLines.join("\n").trim(), topic: topicLines.join("\n").trim(), turns };
}

function serializeScriptText(turns, personality, topic) {
  const parts = [];
  if (personality && personality.trim()) parts.push("[PERSONALITY]\n" + personality.trim());
  if (topic && topic.trim())             parts.push("[TOPIC]\n"       + topic.trim());
  for (const t of turns) {
    let header = `[${t.speaker}`;
    if (t.speaker === "REACHY") {
      if (!t.improv && t.gesture && t.gesture !== "idle") header += ` gesture=${t.gesture}`;
      if (t.improv) header += " improv=true";
    }
    header += "]";
    const body = t.improv ? (t.hint || "") : (t.text || "");
    parts.push(header + (body ? "\n" + body : ""));
  }
  return parts.join("\n\n");
}

// ── Editor: render ──
function renderEditor() {
  const list = document.getElementById("turn-list");
  list.innerHTML = "";
  editorTurns.forEach((turn, i) => {
    list.appendChild(makeTurnCard(turn, i));
  });
}

function makeTurnCard(turn, i) {
  const card = document.createElement("div");
  card.className = "turn-card";
  card.dataset.index = i;

  // Header row: speaker select + actions
  const hdr = document.createElement("div");
  hdr.className = "turn-card-header";

  const spkSel = document.createElement("select");
  spkSel.className = `spk-select ${turn.speaker.toLowerCase()}`;
  ["HUMAN","REACHY"].forEach(s => {
    const o = document.createElement("option");
    o.value = s; o.textContent = s;
    if (s === turn.speaker) o.selected = true;
    spkSel.appendChild(o);
  });
  spkSel.onchange = () => {
    editorTurns[i].speaker = spkSel.value;
    spkSel.className = `spk-select ${spkSel.value.toLowerCase()}`;
    reachyOpts.style.display = spkSel.value === "REACHY" ? "flex" : "none";
    updateImprovView(i, card);
  };

  const actions = document.createElement("div");
  actions.className = "card-actions";
  const upBtn  = iconBtn("↑", () => moveTurn(i, -1));
  const dnBtn  = iconBtn("↓", () => moveTurn(i, +1));
  const delBtn = iconBtn("✕", () => deleteTurn(i), "del");
  actions.append(upBtn, dnBtn, delBtn);
  hdr.append(spkSel, actions);

  // Text area
  const txt = document.createElement("textarea");
  txt.className = "turn-text";
  txt.placeholder = turn.speaker === "HUMAN" ? "What the human says…" : "What Reachy says…";
  txt.value = turn.improv ? "" : turn.text;
  txt.rows = 2;
  txt.oninput = () => { editorTurns[i].text = txt.value; };

  // REACHY-only options
  const reachyOpts = document.createElement("div");
  reachyOpts.className = "reachy-opts";
  reachyOpts.style.display = turn.speaker === "REACHY" ? "flex" : "none";

  // Gesture dropdown
  const gLabel = document.createElement("label");
  gLabel.textContent = "Gesture";
  const gSel = document.createElement("select");
  gSel.className = "gesture-select";
  GESTURES.forEach(g => {
    const o = document.createElement("option");
    o.value = g; o.textContent = g.replace("_"," ");
    if (g === (turn.gesture || "idle")) o.selected = true;
    gSel.appendChild(o);
  });
  gSel.onchange = () => { editorTurns[i].gesture = gSel.value; };
  gLabel.appendChild(gSel);

  // Improv toggle
  const iLabel = document.createElement("label");
  const iCheck = document.createElement("input");
  iCheck.type = "checkbox"; iCheck.className = "improv-check";
  iCheck.checked = turn.improv;
  iCheck.onchange = () => {
    editorTurns[i].improv = iCheck.checked;
    updateImprovView(i, card);
  };
  iLabel.append(iCheck, " LLM improv");

  // Hint input (only shown when improv checked)
  const hintInput = document.createElement("input");
  hintInput.className = "improv-hint-input";
  hintInput.placeholder = "Optional topic hint for LLM…";
  hintInput.value = turn.hint || "";
  hintInput.style.display = turn.improv ? "block" : "none";
  hintInput.oninput = () => { editorTurns[i].hint = hintInput.value; };

  reachyOpts.append(gLabel, iLabel, hintInput);
  card.append(hdr, txt, reachyOpts);

  // Hide text area when improv (LLM writes the line)
  if (turn.improv) txt.style.display = "none";

  return card;
}

function updateImprovView(i, card) {
  const improv = editorTurns[i].improv;
  const txt   = card.querySelector(".turn-text");
  const hint  = card.querySelector(".improv-hint-input");
  if (txt)  txt.style.display  = improv ? "none"  : "block";
  if (hint) hint.style.display = improv ? "block" : "none";
}

function iconBtn(label, fn, extraClass="") {
  const b = document.createElement("button");
  b.className = "icon-btn" + (extraClass ? " "+extraClass : "");
  b.textContent = label;
  b.onclick = fn;
  return b;
}

function addTurn() {
  editorTurns.push({ speaker:"HUMAN", text:"", gesture:"idle", improv:false, hint:"" });
  renderEditor();
  // scroll to bottom
  const list = document.getElementById("turn-list");
  list.scrollTop = list.scrollHeight;
}

function deleteTurn(i) {
  editorTurns.splice(i, 1);
  renderEditor();
}

function moveTurn(i, dir) {
  const j = i + dir;
  if (j < 0 || j >= editorTurns.length) return;
  [editorTurns[i], editorTurns[j]] = [editorTurns[j], editorTurns[i]];
  renderEditor();
}

// ── Save ──
async function saveScript() {
  const name = document.getElementById("ed-filename").value.trim();
  if (!name) return;
  const filename = name.endsWith(".txt") ? name : name + ".txt";
  document.getElementById("ed-filename").value = filename;

  // Guard: warn if saving under a different name that already exists
  if (filename !== editorSourceName && scripts.includes(filename)) {
    if (!confirm(`"${filename}" already exists. Overwrite it?`)) return;
  }

  const personality = document.getElementById("ed-personality").value.trim();
  const topic = document.getElementById("ed-topic").value.trim();
  const content = serializeScriptText(editorTurns, personality, topic);
  const res = await fetch(`/api/scripts/${encodeURIComponent(filename)}`, {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({content})
  });
  if (res.ok) {
    editorSourceName = filename; // update source so subsequent saves don't re-warn
    const fl = document.getElementById("saved-flash");
    fl.classList.add("show");
    setTimeout(() => fl.classList.remove("show"), 1800);
    await loadScriptList();
  } else {
    alert("Save failed — check that the server is running.");
  }
}

// ── Perform view ──
function renderPerform() {
  const { turns, index } = appState;
  const view = document.getElementById("script-view");
  view.innerHTML = "";
  turns.forEach((turn, i) => {
    const div = document.createElement("div");
    div.className = `turn ${turn.speaker.toLowerCase()} ${
      i<index?"past":i===index?"active":"future"
    }`;
    const spk = document.createElement("div");
    spk.className = "spk";
    spk.textContent = turn.speaker;
    if (turn.gesture && turn.gesture !== "idle") {
      const b = document.createElement("span");
      b.className = "badge"; b.textContent = turn.gesture;
      spk.appendChild(b);
    }
    if (turn.improv) {
      const b = document.createElement("span");
      b.className = "badge"; b.textContent = "improv";
      spk.appendChild(b);
    }
    const txt = document.createElement("div");
    txt.className = "txt";
    txt.textContent = turn.text || (turn.improv ? "…" : "");
    div.append(spk, txt);
    view.appendChild(div);
    if (i===index) setTimeout(()=>div.scrollIntoView({behavior:"smooth",block:"center"}),50);
  });
}

function renderFooter() {
  const { index, status, total } = appState;
  const btn  = document.getElementById("btn-next");
  const foot = document.getElementById("footer-status");
  btn.disabled = ["playing","thinking","done"].includes(status);
  btn.textContent = index < 0 ? "Start →" : "Next →";
  if      (status==="done")      foot.textContent = "Script complete";
  else if (status==="thinking")  foot.textContent = "Reachy is thinking…";
  else if (status==="playing")   foot.textContent = "Reachy is speaking…";
  else if (status==="listening") foot.textContent = "Listening — speak freely or press Next";
  else if (index < 0)            foot.textContent = `${total} turns loaded`;
  else                           foot.textContent = `${total-index-1} turn${total-index-1!==1?"s":""} remaining`;
}

async function nextTurn() {
  document.getElementById("btn-next").disabled = true;
  await fetch("/api/next", {method:"POST"});
}

function toggleTeleprompter() {
  teleprompterOn = !teleprompterOn;
  const btn = document.getElementById("btn-tp");
  btn.classList.toggle("active", teleprompterOn);
  btn.textContent = teleprompterOn ? "✕ Teleprompter" : "⬛ Teleprompter";
  renderTeleprompter();
}

function renderTeleprompter() {
  const el = document.getElementById("teleprompter");
  if (!teleprompterOn) { el.classList.remove("active"); return; }

  const { turns, index, status } = appState;
  const current = turns[index];

  // Show teleprompter when it's the human's turn (listening or waiting)
  const isHumanTurn = current && current.speaker === "HUMAN" &&
    (status === "listening" || status === "waiting");

  if (!isHumanTurn) { el.classList.remove("active"); return; }

  el.classList.add("active");
  document.getElementById("tp-text").textContent = current.text || "…";

  // Show next Reachy line as a small hint
  const nextReachy = turns.slice(index + 1).find(t => t.speaker === "REACHY");
  const nextEl = document.getElementById("tp-next");
  const nextTextEl = document.getElementById("tp-next-text");
  if (nextReachy && nextReachy.text) {
    nextEl.style.display = "block";
    nextTextEl.textContent = nextReachy.text;
  } else {
    nextEl.style.display = "none";
  }
}

// ── Init ──
loadScriptList();
renderPerform();
renderFooter();
setTab("perform");
</script>
